<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الحجز - Loving Home</title>
  <link rel="stylesheet" href="style.css" />

</head>

<body>
  <header class="site-header">
    <div class="top-bar">
      <img src="logo.jpg" alt="شعار الفندق" class="logo" />
      <div>
        <h1>الحجز</h1>
        <p class="tagline">املأ البيانات وسيظهر تأكيد بسيط</p>
      </div>
    </div>
<nav>
<a href="index.html">الرئيسية</a>
<a href="packages.html">الباقات</a>
<a href="gallery.html">الصور</a>
<a href="booking.html">الحجز</a>
</nav>
  </header>

  <main>
    <section class="card">
      <h2>بيانات الحجز</h2>

      <form id="bookingForm" class="form">
        <label>
          اسم العميل
          <input type="text" id="customerName" required>
        </label>

        <label>
          رقم الهاتف
          <input type="tel" id="customerPhone" placeholder="+852 ...." required>
        </label>

        <label>
          اسم الكلب
          <input type="text" id="dogName" required>
        </label>

        <label>
          اختيار الباقة
          <select id="packageType" required>
            <option value="">اختر</option>
            <option value="المميزة">المميزة</option>
            <option value="الكلاسيكية">الكلاسيكية</option>
            <option value="اليوم">اليوم</option>
          </select>
        </label>

        <label>
          تاريخ الدخول
          <input type="date" id="checkinDate" required>
        </label>

        <label>
          ملاحظات (اختياري)
          <textarea id="notes" rows="3"></textarea>
        </label>

        <button type="submit" class="btn">إرسال</button>
        <p id="msg" class="msg"></p>
      </form>
    </section>

    <section class="card">
      <h2>الموقع</h2>
      <p><strong>هونغ كونغ</strong></p>
      <p><strong>الهاتف:</strong> +852 2508 1234</p>
      <p>
        <a href="https://share.google/5P6tCpt4SVcNC7iMo" target="_blank">فتح الموقع على الخريطة</a>
      </p>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Loving Home</p>
  </footer>  
  <script src="script.js" ></script>
</body>
</html>
